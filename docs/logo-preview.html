<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Marlin logo preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  body{font-family:Inter,sans-serif;margin:0;background:#f3f3f3;color:#16325c}
  h1{padding:24px 24px 0;font-size:18px}
  .row{display:flex;gap:24px;flex-wrap:wrap;padding:24px}
  .card{border-radius:14px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .navy{background:#16325c}.white{background:#fff}
  .lbl{font-size:12px;opacity:.6}
  .lock{display:flex;align-items:center;gap:10px}
  .wm{font-weight:800;letter-spacing:-.02em;font-size:32px}
</style></head>
<body>
<h1>Marlin — recreated from your circled picks (sleek mark + bold wordmark)</h1>
<div class="row" id="row1"></div>
<div class="row" id="row2"></div>
<script>
  const MARLIN = `
    <path d="M10 32 C30 30 48 32 64 40 C70 24 80 16 92 16 C86 28 78 36 70 42 C84 44 100 46 116 42 L136 28 C128 38 124 42 120 46 L134 62 C118 52 102 52 88 54 C72 58 50 54 34 46 C24 42 16 38 10 32 Z"/>
    <path d="M64 44 C64 56 70 66 78 68 C74 58 72 50 72 44 C69 44 66 44 64 44 Z"/>`;
  const mark = (h, fill) => `<svg viewBox="0 0 140 80" height="${h}" fill="${fill}">${MARLIN}</svg>`;
  const tile = (s) => `<svg viewBox="0 0 64 64" width="${s}" height="${s}"><rect width="64" height="64" rx="14" fill="#16325c"/><g transform="translate(4 18) scale(0.4)" fill="#3ec6e0">${MARLIN}</g></svg>`;

  document.getElementById("row1").innerHTML = `
    <div class="card navy"><div class="lbl" style="color:#fff">Header lockup (navy)</div>
      <div class="lock">${mark(44,"#3ec6e0")}<span class="wm" style="color:#fff">Marlin</span></div></div>
    <div class="card white"><div class="lbl">Lockup (white)</div>
      <div class="lock">${mark(44,"#16325c")}<span class="wm">Marlin</span></div></div>`;
  document.getElementById("row2").innerHTML = `
    <div class="card white"><div class="lbl">Mark only (large)</div>${mark(110,"#16325c")}</div>
    <div class="card white"><div class="lbl">Favicon tile</div>${tile(64)}</div>
    <div class="card white"><div class="lbl">Favicon actual (16 / 32px)</div>
      <div style="display:flex;align-items:center;gap:16px">${tile(16)}${tile(32)}</div></div>`;
</script>
</body></html>
