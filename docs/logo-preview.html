<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Marlin logo preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  body{font-family:Inter,sans-serif;margin:0;background:#f3f3f3;color:#16325c}
  h1{padding:24px 24px 0;font-size:18px}
  .row{display:flex;gap:24px;flex-wrap:wrap;padding:24px}
  .card{border-radius:14px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .navy{background:#16325c}.white{background:#fff}
  .lbl{font-size:12px;opacity:.6}
  .lock{display:flex;align-items:center;gap:10px}
  .wm{font-weight:700;letter-spacing:-.01em;font-size:30px}
</style></head>
<body>
<h1>Marlin — logo preview (redrawn marlin fish + the word “Marlin”)</h1>
<div class="row" id="row1"></div>
<div class="row" id="row2"></div>
<script>
  // single source of truth for the marlin silhouette
  const MARLIN = (eye) => `
    <path d="M22 35 C16 28 12 22 8 15 C16 21 20 27 24 33 Z"/>
    <path d="M22 37 C16 44 12 50 8 57 C16 51 20 45 24 39 Z"/>
    <path d="M22 34 C32 24 46 20 64 21 C76 22 86 25 98 29 L126 31 L126 33 L98 34 C86 38 76 41 64 42 C46 44 32 42 22 38 Z"/>
    <path d="M48 25 C54 9 66 5 82 8 C74 15 64 21 54 26 C52 26 50 26 48 25 Z"/>
    <path d="M80 34 C84 45 82 55 74 61 C76 51 74 43 72 36 C75 35 78 34 80 34 Z"/>
    <circle cx="110" cy="31" r="2.6" fill="${eye}"/>`;
  const mark = (h, fill, eye) => `<svg viewBox="0 0 128 72" height="${h}" fill="${fill}">${MARLIN(eye)}</svg>`;
  const tile = (s, eye="#16325c") => `<svg viewBox="0 0 64 64" width="${s}" height="${s}"><rect width="64" height="64" rx="14" fill="#16325c"/><g transform="translate(5 17) scale(0.42)" fill="#3ec6e0">${MARLIN(eye)}</g></svg>`;

  document.getElementById("row1").innerHTML = `
    <div class="card navy"><div class="lbl" style="color:#fff">Header lockup (navy)</div>
      <div class="lock">${mark(42,"#3ec6e0","#16325c")}<span class="wm" style="color:#fff">Marlin</span></div></div>
    <div class="card white"><div class="lbl">Lockup (white)</div>
      <div class="lock">${mark(42,"#1aa0c4","#fff")}<span class="wm">Marlin</span></div></div>`;
  document.getElementById("row2").innerHTML = `
    <div class="card white"><div class="lbl">Mark only (large)</div>${mark(120,"#16325c","#fff")}</div>
    <div class="card white"><div class="lbl">Favicon tile</div>${tile(64)}</div>
    <div class="card white"><div class="lbl">Favicon actual (16 / 32px)</div>
      <div style="display:flex;align-items:center;gap:16px">${tile(16)}${tile(32)}</div></div>`;
</script>
</body></html>
