<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Marlin Marina — interactive concept</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;box-sizing:border-box;font-family:Inter,system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#0a2030}
  #stage{position:fixed;inset:0;cursor:grab;background:
     radial-gradient(120% 90% at 50% 0%, #16455f 0%, #0c2a3e 55%, #081a28 100%)}
  #stage.grabbing{cursor:grabbing}
  svg{width:100%;height:100%;display:block;touch-action:none}
  .building{cursor:pointer;transition:transform .18s ease}
  /* top bar */
  .logo{position:fixed;top:18px;left:22px;display:flex;align-items:center;gap:9px;z-index:5}
  .logo img{height:22px;filter:brightness(0) invert(1)}
  .logo span{color:#fff;font-weight:800;font-size:20px;letter-spacing:-.4px}
  .menu{position:fixed;top:16px;right:18px;display:flex;gap:6px;background:rgba(255,255,255,.08);
        border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(10px);border-radius:30px;padding:6px;z-index:5}
  .menu a{color:#cfe3ee;text-decoration:none;font-size:13px;font-weight:600;padding:8px 14px;border-radius:22px;transition:.15s}
  .menu a:hover,.menu a.on{background:#36c5e0;color:#08202f}
  .hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:#bcd6e3;font-size:13px;
        background:rgba(8,28,42,.6);border:1px solid rgba(255,255,255,.12);padding:8px 16px;border-radius:20px;z-index:5}
  /* popup */
  #pop{position:fixed;z-index:6;min-width:210px;max-width:260px;background:rgba(10,30,45,.96);
       border:1px solid rgba(54,197,224,.5);border-radius:14px;padding:14px 16px;color:#eaf3f8;
       box-shadow:0 20px 50px -10px rgba(0,0,0,.6);opacity:0;transform:translateY(6px);
       pointer-events:none;transition:.16s}
  #pop.show{opacity:1;transform:translateY(0)}
  #pop .tag{font-size:11px;font-weight:700;letter-spacing:.6px;color:#e9c893}
  #pop h4{font-size:16px;margin:3px 0 5px}
  #pop p{font-size:13px;color:#a7c0cf;line-height:1.45}
  #pop .go{display:inline-block;margin-top:10px;font-size:12px;font-weight:700;color:#08202f;background:#36c5e0;padding:7px 12px;border-radius:9px}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
</style></head>

<script>
const SVGNS="http://www.w3.org/2000/svg";
const cam=document.getElementById("cam"), svg=document.getElementById("svg"), stage=document.getElementById("stage"), pop=document.getElementById("pop");
function el(t,a){const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function shade(hex,f){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;}
// isometric projection (30°)
function iso(x,y,z){return [(x-y)*0.866,(x+y)*0.5-z];}
function pts(arr){return arr.map(p=>p.join(",")).join(" ");}

function quad(parent,a,b,c,d,fill){parent.appendChild(el("polygon",{points:pts([a,b,c,d]),fill}));}

// a 3D box footprint (x,y) size (sx,sy) height h, base color
function box(parent,x,y,sx,sy,h,color){
  const t=(X,Y,Z)=>iso(X,Y,Z);
  // right (+x) wall, front (+y) wall, then top
  quad(parent,t(x+sx,y,0),t(x+sx,y+sy,0),t(x+sx,y+sy,h),t(x+sx,y,h),shade(color,.72));
  quad(parent,t(x,y+sy,0),t(x+sx,y+sy,0),t(x+sx,y+sy,h),t(x,y+sy,h),shade(color,.85));
  quad(parent,t(x,y,h),t(x+sx,y,h),t(x+sx,y+sy,h),t(x,y+sy,h),color);
}
// flat ground tile (a filled diamond)
function ground(parent,x,y,sx,sy,fill){
  const t=(X,Y)=>iso(X,Y,0);
  quad(parent,t(x,y),t(x+sx,y),t(x+sx,y+sy),t(x,y+sy),fill);
}
function tree(parent,x,y){const g=el("g",{});parent.appendChild(g);
  box(g,x,y,8,8,14,"#6b4a2a"); const c=el("polygon",{points:pts([iso(x-6,y+4,16),iso(x+4,y-6,16),iso(x+14,y+4,16),iso(x+4,y+14,16)]),fill:"#3f9e74"});g.appendChild(c);
  const c2=el("polygon",{points:pts([iso(x-4,y+4,26),iso(x+4,y-4,26),iso(x+12,y+4,26),iso(x+4,y+12,26)]),fill:"#4bb487"});g.appendChild(c2);}
function boat(parent,x,y,hull,bob){
  const g=el("g",{class:"building"}); parent.appendChild(g);
  box(g,x,y,46,18,7,hull);              // hull
  box(g,x+14,y+3,16,12,12,"#eef2f5");   // cabin
  if(bob){g.style.transformOrigin="center";g.style.animation=`bob ${3+Math.random()*1.5}s ease-in-out infinite`;}
  return g;
}

// ---- build the marina (drawn back-to-front) ----
// water base
ground(cam,-260,-260,760,760,"#15536a");
// shimmer streaks
for(let i=0;i<5;i++) ground(cam,-200+i*70,-200,40,560,"rgba(255,255,255,0.03)");
// land plots
ground(cam,30,10,300,170,"#2c6f5b");
ground(cam,360,20,200,180,"#2c6f5b");
ground(cam,40,210,260,150,"#2c6f5b");
// boardwalk / main pier (wood) reaching to the water (front)
box(cam,150,360,60,180,6,"#b98a52");
box(cam,260,380,200,40,6,"#b98a52");

function svc(g,tag,title,desc){
  g.classList.add("building");
  g.dataset.tag=tag; g.dataset.title=title; g.dataset.desc=desc;
}

// BACK ROW
let g;
g=el("g",{}); cam.appendChild(g); box(g,60,30,110,90,60,"#1f4e6b"); box(g,60,30,110,90,66,"#27608a"); svc(g,"PARTS & RIGGING","Parts Warehouse","Inbound parts, rigging and chandlery — every order tracked with live owner updates.");
g=el("g",{}); cam.appendChild(g); box(g,200,20,150,110,70,"#2a9d8f"); box(g,200,20,150,12,86,"#218175"); svc(g,"SERVICE & REPAIR","Service Yard","Engines, hulls and electronics. The boat is the unit of record — full history, one place.");
g=el("g",{}); cam.appendChild(g); box(g,390,30,100,90,105,"#e7eef2"); box(g,390,30,100,90,118,"#c8663f"); svc(g,"MEMBERSHIPS","Harbormaster's Office","Memberships, concierge and white-glove scheduling for every owner in the marina.");
// MID ROW
g=el("g",{}); cam.appendChild(g); box(g,60,210,120,80,72,"#c8663f"); box(g,60,210,120,80,80,"#e9c893"); svc(g,"OWNERS' CLUB","Clubhouse","Events, rendezvous and the owners' lounge — the social heart of the marina.");
g=el("g",{}); cam.appendChild(g); box(g,300,220,70,70,52,"#e9c893"); svc(g,"FUEL & PROVISIONING","Fuel Dock","Fuel, ice and provisioning so members cast off the moment they arrive.");
// haul-out crane (two posts + beam)
g=el("g",{}); cam.appendChild(g); box(g,470,210,12,12,90,"#cfd6da"); box(g,470,270,12,12,90,"#cfd6da"); box(g,470,210,12,72,8,"#9aa6ac"); g.querySelectorAll("polygon").forEach(p=>p.setAttribute("transform","")); box(g,470,210,80,8,96,"#f0c34a"); svc(g,"HAUL-OUT & STORAGE","Travel-Lift","Haul-out, bottom work and winter storage — booked from the same record.");
// trees for life
[[20,180],[330,10],[300,160],[40,360],[560,40]].forEach(t=>tree(cam,t[0],t[1]));
// FRONT — boats in slips (also interactive: the fleet)
boat(cam,150,470,"#1f3d57",true);
boat(cam,300,470,"#7a1f2b",true);
const fb=boat(cam,440,440,"#0d2a45",true); svc(fb,"YOUR FLEET","\"Sea Quest\"","38' Sport Cruiser · 412 hrs · impeller service due. Tap to open the boat record.");
boat(cam,520,470,"#274b3a",true);

// ---- camera (pan + initial fit) ----
let panX=0,panY=0,scale=1.15;
function applyCam(){cam.setAttribute("transform",`translate(${panX} ${panY}) scale(${scale})`);}
function center(){const r=svg.getBoundingClientRect();panX=r.width/2; panY=r.height/2-120; applyCam();}
center(); window.addEventListener("resize",center);

// ---- interaction: drag to pan, tap to reveal service ----
let down=false,moved=false,sx0=0,sy0=0,px0=0,py0=0;
function start(e){down=true;moved=false;const p=pt(e);sx0=p.x;sy0=p.y;px0=panX;py0=panY;stage.classList.add("grabbing");}
function move(e){if(!down)return;const p=pt(e);const dx=p.x-sx0,dy=p.y-sy0;if(Math.abs(dx)+Math.abs(dy)>6)moved=true;panX=px0+dx;panY=py0+dy;applyCam();}
function end(e){down=false;stage.classList.remove("grabbing");
  if(!moved){const b=e.target.closest(".building");if(b&&b.dataset.title)showPop(b,e);else hidePop();}}
function pt(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
stage.addEventListener("mousedown",start);window.addEventListener("mousemove",move);window.addEventListener("mouseup",end);
stage.addEventListener("touchstart",start,{passive:true});window.addEventListener("touchmove",move,{passive:true});window.addEventListener("touchend",end);
// hover lift + hover popup (desktop)
cam.addEventListener("mouseover",e=>{const b=e.target.closest(".building");if(b){b.style.transform="translateY(-9px)";if(b.dataset.title)showPop(b,e);}});
cam.addEventListener("mouseout",e=>{const b=e.target.closest(".building");if(b){b.style.transform="";}});
function showPop(b,e){pop.querySelector(".tag").textContent=b.dataset.tag;pop.querySelector("h4").textContent=b.dataset.title;pop.querySelector("p").textContent=b.dataset.desc;
  const p=pt(e);let x=p.x+16,y=p.y+16;x=Math.min(x,innerWidth-280);y=Math.min(y,innerHeight-160);pop.style.left=x+"px";pop.style.top=y+"px";pop.classList.add("show");}
function hidePop(){pop.classList.remove("show");}
stage.addEventListener("wheel",e=>{e.preventDefault();scale=Math.min(2.4,Math.max(.6,scale*(e.deltaY<0?1.08:0.92)));applyCam();},{passive:false});
</script></body></html>
